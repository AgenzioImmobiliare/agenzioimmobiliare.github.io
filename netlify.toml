# ════════════════════════════════════════════════════════════════
#  Configurazione Netlify per FRIMM Capital Casa Paestum
#  Serve a far funzionare l'export MP4 (FFmpeg) SENZA bloccare
#  le immagini degli immobili che arrivano da Firebase.
#  Va messo nella cartella principale del sito, accanto a indexplus.html
# ════════════════════════════════════════════════════════════════

[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    # "credentialless" attiva SharedArrayBuffer (per FFmpeg/MP4) MA lascia passare
    # le immagini esterne (Firebase) senza bloccarle. È la versione "morbida".
    Cross-Origin-Embedder-Policy = "credentialless"
    Cross-Origin-Resource-Policy = "cross-origin"
